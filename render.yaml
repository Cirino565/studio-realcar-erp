services:
  - type: web
    name: studio-realcar-erp
    env: node
    buildCommand: npm install && npm run deploy:build
    startCommand: npm run start:host
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Administrador
      - key: ADMIN_RESET_PASSWORD
        value: "false"
      - key: OPERATIONAL_EMAIL
        sync: false
      - key: OPERATIONAL_PASSWORD
        sync: false
      - key: OPERATIONAL_NAME
        value: Operacional
      - key: OPERATIONAL_RESET_PASSWORD
        value: "false"
