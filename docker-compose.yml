services:
  postgres:
    image: postgres:16-alpine
    container_name: studio-realcar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio_dev_password
      POSTGRES_DB: studio_realcar
    ports:
      - "5432:5432"
    volumes:
      - studio_realcar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio -d studio_realcar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  studio_realcar_pgdata:
